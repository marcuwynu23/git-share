name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/test.yml

  release:
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: write
    env:
      APP_NAME: git-share
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build all platforms
        shell: bash
        run: |
          mkdir -p dist
          for pair in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            goos="${pair%/*}"
            goarch="${pair#*/}"
            ext=""
            [ "$goos" = "windows" ] && ext=".exe"
            echo "Building $goos/$goarch..."
            GOOS=$goos GOARCH=$goarch go build \
              -ldflags "-w -X github.com/marcuwynu23/git-share/internal/cli.AppVersion=${VERSION}" \
              -o "dist/${APP_NAME}-${goos}-${goarch}${ext}" ./cmd/git-share
          done
          ls -la dist/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2.2.2
        with:
          files: dist/*
          generate_release_notes: true
